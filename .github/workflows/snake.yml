name: Generate Snake Animation

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: "0 0 * * *"
  # Allows manual triggering from the Actions tab
  workflow_dispatch:
  # Runs on every push to the main branch
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Step 1: Check out the repository so the action can save files to it
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Generate the SVGs and GIF using Platane/snk
      - name: Generate Snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00D9FF&color_dots=#1a1f29,#0d4f63,#0099cc,#00d9ff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=#00D9FF&color_dots=#1a1f29,#0d4f63,#0099cc,#00d9ff

      # Step 3: Deploy the generated files to the 'output' branch
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
